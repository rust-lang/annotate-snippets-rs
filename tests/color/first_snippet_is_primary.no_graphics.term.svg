<svg width="740px" height="128px" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: #AAAAAA }
    .bg { fill: #000000 }
    .container {
      padding: 0 10px;
      line-height: 18px;
    }
    tspan {
      font: 14px SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace;
      white-space: pre;
      line-height: 18px;
    }
  </style>

  <rect width="100%" height="100%" y="0" rx="4.5" class="bg" />

  <text xml:space="preserve" class="container fg">
    <tspan x="10px" y="28px"><tspan>error E0308: mismatched types</tspan>
</tspan>
    <tspan x="10px" y="46px"><tspan>at $DIR/file.txt, on line 3, column 1: the macro expands to this string</tspan>
</tspan>
    <tspan x="10px" y="64px"><tspan>at $DIR/mismatched-types.rs, on line 2, column 20: expected `&amp;[u8]`, found `&amp;str`</tspan>
</tspan>
    <tspan x="10px" y="82px"><tspan> on line 2, column 12: expected due to this</tspan>
</tspan>
    <tspan x="10px" y="100px"><tspan>note: expected reference `&amp;[u8]`</tspan>
</tspan>
    <tspan x="10px" y="118px"><tspan>         found reference `&amp;'static str`</tspan>
</tspan>
  </text>

</svg>
